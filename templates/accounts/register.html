{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}Register — BoardGame Nexus{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
        <h1 class="h3 mb-3">Create an account</h1>
        <form method="post">
            {% csrf_token %}
            {% crispy form %}
            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary">Create account</button>
            </div>
        </form>
        <p class="mt-3 text-muted">Already have an account? <a href="{% url 'accounts:login' %}">Log in</a></p>
    </div>
</div>
{% endblock %}
