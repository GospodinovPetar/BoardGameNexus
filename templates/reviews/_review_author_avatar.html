{% if user_obj.avatar %}
    <img src="{{ user_obj.avatar.url }}" alt="" class="rounded-circle flex-shrink-0 border border-secondary" width="{{ size|default:40 }}" height="{{ size|default:40 }}" style="object-fit: cover;">
{% else %}
    <span class="d-inline-flex align-items-center justify-content-center rounded-circle bg-secondary flex-shrink-0 border border-secondary text-white" style="width: {{ size|default:40 }}px; height: {{ size|default:40 }}px;">
        <i class="bi bi-person-fill"></i>
    </span>
{% endif %}
