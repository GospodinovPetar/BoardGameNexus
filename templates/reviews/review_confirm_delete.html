{% extends 'base.html' %}

{% block title %}Delete review{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="mx-auto col-md-8 col-lg-6">
        <div class="card shadow-sm border-danger">
            <div class="card-body p-4">
                <h1 class="h4 mb-3">Delete review?</h1>
                <p class="mb-2">You are about to delete:</p>
                <p class="fw-semibold mb-4">"{{ review.title }}"</p>
                <p class="text-muted small mb-4">This action cannot be undone.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-between flex-wrap gap-2">
                        <a href="{% url 'reviews:review_detail' review.pk %}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Delete</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
