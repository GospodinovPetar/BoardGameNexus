{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="mx-auto col-lg-8">
        <h1 class="h2 mb-2">{{ page_title }}</h1>
        <p class="text-muted mb-4">
            Game: <strong><a href="{% url 'games:game_details' game.pk %}">{{ game.title }}</a></strong>
        </p>

        <form method="post" class="card p-4 shadow-sm border-secondary">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex justify-content-between mt-4 flex-wrap gap-2">
                <a href="{% url 'games:game_details' game.pk %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">
                    {% if edit %}Save changes{% else %}Submit review{% endif %}
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
