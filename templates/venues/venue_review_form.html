{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="mx-auto col-lg-8">
        <nav aria-label="breadcrumb" class="mb-3">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="{% url 'venues:venue_list' %}">Venues</a></li>
                <li class="breadcrumb-item"><a href="{% url 'venues:venue_detail' venue.slug %}">{{ venue.name }}</a></li>
                <li class="breadcrumb-item active" aria-current="page">Write review</li>
            </ol>
        </nav>

        <h1 class="h2 mb-2">{{ page_title }}</h1>
        <p class="text-muted mb-4">{{ venue.full_address }}</p>

        <form method="post" class="card p-4 shadow-sm border-secondary">
            {% csrf_token %}
            {{ form|crispy }}
            <div class="d-flex justify-content-between mt-4 flex-wrap gap-2">
                <a href="{% url 'venues:venue_detail' venue.slug %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Submit review</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
